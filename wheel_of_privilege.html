<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel of Privilege</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede6;
  --muted: #6b6860;
  --muted2: #4a4845;
  --center-color: #c9a84c;
  --middle-color: #7a9e8a;
  --outer-color: #c05a5a;
  --r: 8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOP NAV ── */
header {
  padding: 1.4rem 2.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  flex-shrink: 0;
}

.header-left h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.35rem;
  letter-spacing: -0.02em;
}

.header-left p {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.legend {
  display: flex;
  gap: 1.2rem;
  align-items: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: var(--muted);
}

.legend-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 2.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0.7rem 1rem;
  font-size: 0.78rem;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}

.tab:hover { color: var(--text); }

.tab.active {
  color: var(--text);
  border-bottom-color: var(--center-color);
}

.tab .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tab .dot.empty { background: var(--muted2); }

.add-tab {
  padding: 0.7rem 0.8rem;
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  transition: color 0.15s;
  border: none;
  background: none;
  font-family: inherit;
}
.add-tab:hover { color: var(--text); }

/* ── MAIN AREA ── */
.main {
  display: grid;
  grid-template-columns: 380px 1fr;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── FORM PANEL ── */
.form-panel {
  overflow-y: auto;
  padding: 1.2rem 1.5rem 2rem;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.anon-notice {
  font-size: 0.7rem;
  color: var(--muted);
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 4px;
  padding: 0.5rem 0.7rem;
  margin-bottom: 0.4rem;
  letter-spacing: 0.02em;
}

.dimension-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.75rem 0.9rem;
  transition: border-color 0.2s;
}

.dimension-block.answered {
  border-color: rgba(255,255,255,0.13);
}

.dimension-label {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.options-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0.35rem;
}

.opt-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: rgba(240,237,230,0.55);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  font-weight: 300;
  padding: 0.38rem 0.25rem;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  line-height: 1.3;
}

.opt-btn:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
}

.opt-btn.active-0 {
  background: rgba(201,168,76,0.18);
  border-color: var(--center-color);
  color: var(--center-color);
  font-weight: 500;
}

.opt-btn.active-1 {
  background: rgba(122,158,138,0.18);
  border-color: var(--middle-color);
  color: var(--middle-color);
  font-weight: 500;
}

.opt-btn.active-2 {
  background: rgba(192,90,90,0.18);
  border-color: var(--outer-color);
  color: var(--outer-color);
  font-weight: 500;
}

/* ── VIZ PANEL ── */
.viz-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem 2rem;
  overflow: hidden;
}

.compare-wrap {
  display: none;
  width: 100%;
  height: 100%;
  flex-direction: column;
}

.compare-wrap.active { display: flex; }

.single-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 480px;
}

.single-wrap.hidden { display: none; }

.radar-box {
  width: 100%;
}

/* COMPARE: two-up grid */
.compare-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding-bottom: 1rem;
}

.compare-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
}

.compare-card-title {
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  align-self: flex-start;
}

.compare-card canvas {
  width: 100% !important;
}

/* stats */
.stats-row {
  display: flex;
  gap: 0.5rem;
  width: 100%;
  max-width: 480px;
  margin-top: 1rem;
}

.stat-pill {
  flex: 1;
  padding: 0.55rem 0.6rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  text-align: center;
}

.stat-n {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem;
  display: block;
}

.stat-l {
  font-size: 0.6rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
}

.stat-pill.s0 .stat-n { color: var(--center-color); }
.stat-pill.s1 .stat-n { color: var(--middle-color); }
.stat-pill.s2 .stat-n { color: var(--outer-color); }

.progress-hint {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 0.6rem;
  letter-spacing: 0.04em;
}

/* toolbar */
.toolbar {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-top: 0.8rem;
}

.tool-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  padding: 0.35rem 0.8rem;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: all 0.15s;
}

.tool-btn:hover {
  border-color: var(--border2);
  color: var(--text);
}

.tool-btn.danger:hover {
  border-color: var(--outer-color);
  color: var(--outer-color);
}

.view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.vt-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  padding: 0.35rem 0.7rem;
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: all 0.15s;
}

.vt-btn:hover { color: var(--text); }

.vt-btn.active {
  background: rgba(255,255,255,0.07);
  color: var(--text);
}

/* overlay radar (compare view) */
.overlay-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  flex: 1;
  min-height: 0;
}

.overlay-box {
  width: 100%;
  max-width: 440px;
}

.overlay-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  justify-content: center;
  margin-top: 0.8rem;
}

.ol-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.7rem;
  color: var(--muted);
}

.ol-swatch {
  width: 20px; height: 3px;
  border-radius: 2px;
}

@media (max-width: 700px) {
  .main { grid-template-columns: 1fr; }
  .form-panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 45vh; }
  .viz-panel { padding: 1rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Wheel of Privilege</h1>
    <p>Intersectionality — anonymous self-positioning tool</p>
  </div>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--center-color)"></span>Privileged</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--middle-color)"></span>Middle</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--outer-color)"></span>Marginalized</div>
    </div>
  </div>
</header>

<div class="tab-bar" id="tabBar">
  <!-- tabs injected by JS -->
  <button class="add-tab" id="addTabBtn" title="Add profile">+</button>
</div>

<div class="main">
  <div class="form-panel" id="formPanel">
    <div class="anon-notice">Anonymous mode — no names or identifying information are collected.</div>
    <!-- dimension blocks injected by JS -->
  </div>

  <div class="viz-panel" id="vizPanel">
    <!-- content injected by JS -->
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DIMS = [
  { key:'gender',    label:'Gender',          opts:['Cisgender man','Cisgender woman','Trans / nonbinary'] },
  { key:'citizen',   label:'Citizenship',     opts:['Citizen','Documented','Undocumented'] },
  { key:'skin',      label:'Skin colour',     opts:['White','Lighter shades','Dark'] },
  { key:'edu',       label:'Formal education',opts:['Higher education','Post-16 education','Left before 16'] },
  { key:'ability',   label:'Ability',         opts:['Able-bodied','Some disability','Significant disability'] },
  { key:'sex',       label:'Sexuality',       opts:['Heterosexual','Gay man','Lesbian / bi / pan / asex'] },
  { key:'neuro',     label:'Neurodiversity',  opts:['Neurotypical','Neuroatypical','Significant neurodivergence'] },
  { key:'mental',    label:'Mental health',   opts:['Robust','Mostly stable','Vulnerable'] },
  { key:'body',      label:'Body size',       opts:['Slim','Average','Large'] },
  { key:'housing',   label:'Housing',         opts:['Property owner','Sheltered / renting','Homeless'] },
  { key:'wealth',    label:'Wealth',          opts:['Comfortable','Struggling','Poverty'] },
  { key:'language',  label:'Language',        opts:['Majority language','Learned language','Monolingual minority'] },
];

const PALETTE = [
  { border:'rgba(201,168,76,0.85)',  bg:'rgba(201,168,76,0.10)',  hex:'#c9a84c' },
  { border:'rgba(122,158,138,0.85)', bg:'rgba(122,158,138,0.10)', hex:'#7a9e8a' },
  { border:'rgba(192,90,90,0.85)',   bg:'rgba(192,90,90,0.10)',   hex:'#c05a5a' },
  { border:'rgba(130,140,200,0.85)', bg:'rgba(130,140,200,0.10)', hex:'#828cc8' },
  { border:'rgba(190,130,80,0.85)',  bg:'rgba(190,130,80,0.10)',  hex:'#be8250' },
  { border:'rgba(160,100,170,0.85)', bg:'rgba(160,100,170,0.10)', hex:'#a064aa' },
];

const RING_COLORS = ['#c9a84c','#7a9e8a','#c05a5a'];
const RING_LABELS = ['Privileged','Middle','Marginalized'];

let profiles = []; // [{id, state:{}}]
let activeId = null;
let viewMode = 'single'; // 'single' | 'overlay' | 'grid'
let chartInstances = {}; // id -> Chart
let overlayChart = null;

function makeId() { return Math.random().toString(36).slice(2,7); }

function addProfile() {
  const id = makeId();
  profiles.push({ id, state:{} });
  if (!activeId) activeId = id;
  renderTabs();
  renderForm();
  renderViz();
  return id;
}

function removeProfile(id) {
  profiles = profiles.filter(p => p.id !== id);
  if (activeId === id) activeId = profiles.length ? profiles[profiles.length-1].id : null;
  if (!profiles.length) addProfile();
  else { renderTabs(); renderForm(); renderViz(); }
}

function setActive(id) {
  activeId = id;
  renderTabs();
  renderForm();
  renderViz();
}

function getProfile(id) { return profiles.find(p => p.id === id); }
function activeProfile() { return getProfile(activeId); }

// ── TABS ──
function renderTabs() {
  const bar = document.getElementById('tabBar');
  const addBtn = document.getElementById('addTabBtn');
  bar.querySelectorAll('.tab').forEach(t => t.remove());

  profiles.forEach((p, i) => {
    const answered = Object.keys(p.state).length;
    const palIdx = i % PALETTE.length;
    const tab = document.createElement('div');
    tab.className = 'tab' + (p.id === activeId ? ' active' : '');
    tab.innerHTML = `
      <span class="dot ${answered===0?'empty':''}" style="background:${answered>0?PALETTE[palIdx].hex:''}"></span>
      Profile ${i+1}
      ${profiles.length > 1 ? `<span class="tab-close" style="margin-left:4px;color:var(--muted);font-size:0.9rem;line-height:1" data-id="${p.id}">×</span>` : ''}
    `;
    tab.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) {
        removeProfile(e.target.dataset.id);
      } else {
        setActive(p.id);
      }
    });
    bar.insertBefore(tab, addBtn);
  });
}

// ── FORM ──
function renderForm() {
  const panel = document.getElementById('formPanel');
  panel.innerHTML = `<div class="anon-notice">Anonymous mode — no names or identifying information are collected.</div>`;

  const prof = activeProfile();
  if (!prof) return;

  DIMS.forEach(dim => {
    const block = document.createElement('div');
    block.className = 'dimension-block' + (prof.state[dim.key]!==undefined?' answered':'');
    block.innerHTML = `<div class="dimension-label">${dim.label}</div><div class="options-row"></div>`;
    const row = block.querySelector('.options-row');

    dim.opts.forEach((opt, ri) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn' + (prof.state[dim.key]===ri ? ` active-${ri}` : '');
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        prof.state[dim.key] = ri;
        renderForm();
        renderViz();
        renderTabs();
      });
      row.appendChild(btn);
    });
    panel.appendChild(block);
  });
}

// ── VIZ ──
function renderViz() {
  const panel = document.getElementById('vizPanel');
  panel.innerHTML = '';

  // toolbar
  const tb = document.createElement('div');
  tb.className = 'toolbar';
  tb.style.marginBottom = '1rem';

  // view toggle (only if multiple profiles)
  if (profiles.length > 1) {
    const vt = document.createElement('div');
    vt.className = 'view-toggle';
    [['single','Individual'],['overlay','Overlay'],['grid','Grid']].forEach(([m,l]) => {
      const b = document.createElement('button');
      b.className = 'vt-btn' + (viewMode===m?' active':'');
      b.textContent = l;
      b.addEventListener('click', () => { viewMode = m; renderViz(); });
      vt.appendChild(b);
    });
    tb.appendChild(vt);
  }

  const resetBtn = document.createElement('button');
  resetBtn.className = 'tool-btn danger';
  resetBtn.textContent = 'Reset';
  resetBtn.addEventListener('click', () => {
    if (activeProfile()) { activeProfile().state = {}; renderForm(); renderViz(); renderTabs(); }
  });
  tb.appendChild(resetBtn);
  panel.appendChild(tb);

  if (viewMode === 'single' || profiles.length === 1) {
    renderSingleViz(panel, activeProfile(), profiles.indexOf(activeProfile()) % PALETTE.length);
  } else if (viewMode === 'overlay') {
    renderOverlayViz(panel);
  } else {
    renderGridViz(panel);
  }
}

function buildRadarData(prof, palIdx) {
  const data = DIMS.map(d => prof.state[d.key]!==undefined ? 3 - prof.state[d.key] : null);
  const ptColors = DIMS.map(d => {
    if (prof.state[d.key]===undefined) return 'rgba(255,255,255,0.12)';
    return RING_COLORS[prof.state[d.key]];
  });
  return {
    labels: DIMS.map(d => d.label),
    datasets: [{
      data,
      backgroundColor: PALETTE[palIdx].bg,
      borderColor: PALETTE[palIdx].border,
      borderWidth: 1.5,
      pointBackgroundColor: ptColors,
      pointBorderColor: 'transparent',
      pointRadius: 4,
      fill: true,
    }]
  };
}

const radarOpts = (tooltipFn) => ({
  responsive: true,
  maintainAspectRatio: true,
  animation: { duration: 250 },
  scales: {
    r: {
      min:0, max:3,
      ticks: { stepSize:1, display:false },
      grid: { color:'rgba(255,255,255,0.07)', lineWidth:1 },
      angleLines: { color:'rgba(255,255,255,0.07)', lineWidth:1 },
      pointLabels: { color:'#6b6860', font:{ family:'DM Sans', size:10, weight:'300' }, padding:6 },
    }
  },
  plugins: {
    legend: { display:false },
    tooltip: {
      callbacks: { label: tooltipFn },
      backgroundColor:'#1c1c1c',
      borderColor:'rgba(255,255,255,0.1)',
      borderWidth:1,
      titleColor:'#c9a84c',
      bodyColor:'#f0ede6',
      padding:10,
      titleFont:{ family:'DM Sans', size:11 },
      bodyFont:{ family:'DM Sans', size:11 },
    }
  }
});

function tooltipFor(prof) {
  return (ctx) => {
    const v = ctx.raw;
    if (v===null) return 'Not answered';
    const dim = DIMS[ctx.dataIndex];
    return dim.opts[3 - v] || '';
  };
}

function statsFor(prof) {
  let c = [0,0,0];
  DIMS.forEach(d => { if (prof.state[d.key]!==undefined) c[prof.state[d.key]]++; });
  return c;
}

function renderSingleViz(panel, prof, palIdx) {
  if (!prof) return;

  const wrap = document.createElement('div');
  wrap.className = 'single-wrap';

  const canvasBox = document.createElement('div');
  canvasBox.className = 'radar-box';
  const canvas = document.createElement('canvas');
  canvasBox.appendChild(canvas);
  wrap.appendChild(canvasBox);

  const stats = statsFor(prof);
  const statsRow = document.createElement('div');
  statsRow.className = 'stats-row';
  RING_LABELS.forEach((l,i) => {
    statsRow.innerHTML += `<div class="stat-pill s${i}"><span class="stat-n">${stats[i]}</span><span class="stat-l">${l}</span></div>`;
  });
  wrap.appendChild(statsRow);

  const answered = Object.keys(prof.state).length;
  const hint = document.createElement('div');
  hint.className = 'progress-hint';
  hint.textContent = `${answered} of ${DIMS.length} dimensions answered`;
  wrap.appendChild(hint);

  panel.appendChild(wrap);

  new Chart(canvas, {
    type:'radar',
    data: buildRadarData(prof, palIdx),
    options: radarOpts(tooltipFor(prof)),
  });
}

function renderOverlayViz(panel) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;width:100%;';

  const canvasBox = document.createElement('div');
  canvasBox.style.cssText = 'width:100%;max-width:440px;';
  const canvas = document.createElement('canvas');
  canvasBox.appendChild(canvas);
  wrap.appendChild(canvasBox);

  // legend
  const leg = document.createElement('div');
  leg.className = 'overlay-legend';
  profiles.forEach((p, i) => {
    const pi = i % PALETTE.length;
    leg.innerHTML += `<div class="ol-item"><span class="ol-swatch" style="background:${PALETTE[pi].hex}"></span>Profile ${i+1} (${Object.keys(p.state).length}/${DIMS.length})</div>`;
  });
  wrap.appendChild(leg);

  panel.appendChild(wrap);

  const datasets = profiles.map((p, i) => {
    const pi = i % PALETTE.length;
    return {
      label: `Profile ${i+1}`,
      data: DIMS.map(d => p.state[d.key]!==undefined ? 3 - p.state[d.key] : null),
      backgroundColor: PALETTE[pi].bg,
      borderColor: PALETTE[pi].border,
      borderWidth: 1.5,
      pointBackgroundColor: DIMS.map(d => p.state[d.key]!==undefined ? RING_COLORS[p.state[d.key]] : 'rgba(255,255,255,0.1)'),
      pointBorderColor:'transparent',
      pointRadius:3,
      fill:true,
    };
  });

  new Chart(canvas, {
    type:'radar',
    data: { labels: DIMS.map(d => d.label), datasets },
    options: {
      responsive:true, maintainAspectRatio:true, animation:{duration:250},
      scales:{ r:{ min:0,max:3,ticks:{display:false},grid:{color:'rgba(255,255,255,0.07)'},angleLines:{color:'rgba(255,255,255,0.07)'},pointLabels:{color:'#6b6860',font:{family:'DM Sans',size:10,weight:'300'},padding:6}}},
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{ label:(ctx)=>{
            const p = profiles[ctx.datasetIndex];
            const v = ctx.raw;
            if(v===null) return 'Not answered';
            return DIMS[ctx.dataIndex].opts[3-v]||'';
          }},
          backgroundColor:'#1c1c1c',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleColor:'#c9a84c',bodyColor:'#f0ede6',padding:10,
          titleFont:{family:'DM Sans',size:11},bodyFont:{family:'DM Sans',size:11},
        }
      }
    }
  });
}

function renderGridViz(panel) {
  const grid = document.createElement('div');
  grid.className = 'compare-grid';

  profiles.forEach((p, i) => {
    const pi = i % PALETTE.length;
    const card = document.createElement('div');
    card.className = 'compare-card';
    card.innerHTML = `<div class="compare-card-title" style="color:${PALETTE[pi].hex}">Profile ${i+1} <span style="color:var(--muted);font-size:0.62rem">(${Object.keys(p.state).length}/${DIMS.length})</span></div>`;

    const canvas = document.createElement('canvas');
    card.appendChild(canvas);

    const stats = statsFor(p);
    const miniStats = document.createElement('div');
    miniStats.style.cssText = 'display:flex;gap:0.4rem;width:100%';
    RING_LABELS.forEach((l,ri) => {
      miniStats.innerHTML += `<div style="flex:1;text-align:center;border:1px solid var(--border);border-radius:4px;padding:0.3rem 0.2rem"><span style="display:block;font-family:DM Serif Display,serif;font-size:1rem;color:${RING_COLORS[ri]}">${stats[ri]}</span><span style="font-size:0.55rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)">${l}</span></div>`;
    });
    card.appendChild(miniStats);

    grid.appendChild(card);

    setTimeout(() => {
      new Chart(canvas, {
        type:'radar',
        data: buildRadarData(p, pi),
        options: radarOpts(tooltipFor(p)),
      });
    }, 0);
  });

  panel.appendChild(grid);
}

// ── INIT ──
document.getElementById('addTabBtn').addEventListener('click', () => {
  const id = addProfile();
  setActive(id);
  viewMode = profiles.length > 1 ? viewMode : 'single';
});

addProfile(); // start with one profile
</script>
